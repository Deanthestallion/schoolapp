<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Secondary School Kafin Hausa MVP</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Local Styles -->
    <link rel="stylesheet" href="styles.css?v=3">
</head>

<body>
    <div id="slideshow-container">
        <!-- Slides will be dynamically injected here by JS -->
        <div class="slideshow-overlay"></div>
    </div>
    <div class="blob shape-1"></div>
    <div class="blob shape-2"></div>

    <header class="glass-nav">
        <div class="logo" id="nav-logo" style="cursor: pointer;">
            <img src="images/logo.jpg" alt="Logo" style="height: 48px; border-radius: 50%;">
            <span>Science Secondary School Kafin Hausa</span>
        </div>
        <div style="display: flex; gap: 1rem;">
            <button id="nav-home-btn" class="nav-btn" style="display: none;">
                <i class="fa-solid fa-house"></i> Home
            </button>
            <button id="nav-logout-btn" class="nav-btn" style="display: none; background: #ef4444; color: white;">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </header>

    <main id="app-container" class="container">
        <!-- Views will be injected here via JavaScript -->
    </main>

    <!-- Modal Container -->
    <div id="modal-container" class="modal-overlay" style="display: none;">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h3 id="modal-title">Title</h3>
                <button id="modal-close" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Modal content -->
            </div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- OCR & Excel Extraction SDKs -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

    <!-- Base Scripts -->
    <script src="supabase.js?v=4"></script>
    <script src="app.js?v=4"></script>
</body>

</html>
